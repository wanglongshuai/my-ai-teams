<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Teams IM</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 顶部导航 -->
  <header class="header">
    <div class="header-left">
      <span class="logo">🤖 AI Teams IM</span>
    </div>
    <nav class="header-nav">
      <button class="nav-btn active" data-view="chat" onclick="switchView('chat')">💬 聊天</button>
      <button class="nav-btn" data-view="tasks" onclick="switchView('tasks')">
        📋 任务
        <span id="task-running-badge" class="task-running-badge hidden">0</span>
      </button>
      <button class="nav-btn" data-view="org" onclick="switchView('org')">🏢 组织架构</button>
    </nav>
    <div class="header-right">
      <span class="status-dot"></span>
      <span id="status-text">连接中...</span>
    </div>
  </header>

  <!-- 聊天视图 -->
  <div id="view-chat" class="view">
    <div class="chat-layout">
      <!-- 左侧：群组列表 -->
      <aside class="sidebar">
        <div class="sidebar-section">
          <div class="section-header"><span>团队群</span></div>
          <div id="group-list-team" class="group-list"></div>
        </div>
        <div class="sidebar-section">
          <div class="section-header"><span>管理层群</span></div>
          <div id="group-list-management" class="group-list"></div>
        </div>
        <div class="sidebar-section">
          <div class="section-header"><span>单聊</span></div>
          <div id="group-list-direct" class="group-list"></div>
        </div>
        <div class="sidebar-section">
          <div class="section-header">
            <span>自定义群</span>
            <button class="btn-new-group" onclick="openNewGroupModal()" title="新建群聊">＋</button>
          </div>
          <div id="group-list-custom" class="group-list"></div>
        </div>
      </aside>

      <!-- 中间：聊天区域 -->
      <main class="chat-main">
        <div id="chat-empty" class="chat-empty">
          <div class="empty-illustration">
            <svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="60" cy="60" r="60" fill="#f0f5ff"/>
              <rect x="24" y="38" width="72" height="44" rx="10" fill="#d6e4ff"/>
              <rect x="32" y="46" width="40" height="8" rx="4" fill="#adc6ff"/>
              <rect x="32" y="60" width="28" height="8" rx="4" fill="#adc6ff"/>
              <circle cx="84" cy="72" r="16" fill="#1677ff"/>
              <text x="84" y="77" text-anchor="middle" font-size="16" fill="white">💬</text>
            </svg>
          </div>
          <div class="empty-title">选择一个对话开始聊天</div>
          <div class="empty-desc">从左侧选择团队群、单聊或自定义群，<br>与 AI 团队成员实时协作</div>
          <div class="empty-hints">
            <span class="empty-hint-tag">💡 输入 @ 提及成员</span>
            <span class="empty-hint-tag">↩ 引用消息回复</span>
            <span class="empty-hint-tag">📋 任务看板追踪进度</span>
          </div>
        </div>
        <div id="chat-panel" class="chat-panel hidden">
          <div class="chat-header">
            <div class="chat-header-info">
              <span id="chat-title" class="chat-title"></span>
              <span id="chat-subtitle" class="chat-subtitle"></span>
            </div>
            <div class="chat-header-right">
              <div id="chat-responder-select" class="responder-select hidden">
                <label>回复者：</label>
                <select id="responder-select" onchange="setResponder(this.value)">
                  <option value="">自动（Leader）</option>
                </select>
              </div>
              <div id="task-indicator" class="task-indicator hidden">
                <span class="task-indicator-dot"></span>
                <span id="task-indicator-text">任务进行中</span>
              </div>
            </div>
          </div>
          <div id="messages" class="messages"></div>
          <div id="typing-indicator" class="typing-indicator hidden">
            <span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>
            <span id="typing-name"></span> 正在输入...
          </div>
          <div id="inline-terminal" class="inline-terminal hidden">
            <div class="inline-terminal-header">
              <span class="term-dots"><span></span><span></span><span></span></span>
              <span id="inline-terminal-title" class="term-title">正在处理...</span>
              <button onclick="toggleInlineTerminal()" class="term-toggle">收起</button>
            </div>
            <div id="inline-terminal-body" class="inline-terminal-body"></div>
          </div>
          <div id="reply-preview" class="reply-preview hidden">
            <span id="reply-preview-text"></span>
            <button onclick="clearReply()" style="border:none;background:none;cursor:pointer;color:#999;font-size:16px;">×</button>
          </div>
          <div class="input-area">
            <div class="input-toolbar">
              <button class="toolbar-btn" title="表情" onclick="void 0">😊</button>
              <button class="toolbar-btn" title="图片" onclick="void 0">🖼️</button>
              <button class="toolbar-btn" title="文件" onclick="void 0">📎</button>
              <div class="toolbar-divider"></div>
              <button class="toolbar-btn" title="加粗" onclick="void 0"><b>B</b></button>
              <button class="toolbar-btn" title="代码块" onclick="void 0" style="font-family:monospace;font-size:13px">`</button>
            </div>
            <div class="input-bottom">
              <textarea id="msg-input" placeholder="输入消息，@ 提及成员，Enter 发送" rows="2"
                onkeydown="handleInputKey(event)"></textarea>
              <button class="send-btn" onclick="sendMessage()">发送</button>
            </div>
          </div>
        </div>
      </main>

      <!-- 右侧：成员/群组信息 -->
      <aside class="info-panel">
        <div id="info-empty" class="info-empty">
          <p>选择群组查看详情</p>
        </div>
        <div id="info-content" class="hidden">
          <div id="info-header"></div>
          <div id="info-members"></div>
        </div>
      </aside>
    </div>
  </div>

  <!-- 任务看板视图 -->
  <div id="view-tasks" class="view hidden">
    <div class="task-board-layout">
      <!-- 左侧：任务列表 -->
      <div class="task-list-panel">
        <div class="task-list-header">
          <h2 class="task-board-title">任务看板</h2>
          <div class="task-filters">
            <button class="filter-btn active" data-status="all" onclick="filterTasks('all', this)">全部</button>
            <button class="filter-btn" data-status="running" onclick="filterTasks('running', this)">进行中</button>
            <button class="filter-btn" data-status="completed" onclick="filterTasks('completed', this)">已完成</button>
            <button class="filter-btn" data-status="failed" onclick="filterTasks('failed', this)">失败</button>
          </div>
        </div>
        <div id="task-list" class="task-list">
          <div class="task-list-empty">暂无任务，在团队群中给 Leader 发消息即可创建任务</div>
        </div>
      </div>
      <!-- 右侧：任务详情 + 执行日志 -->
      <div class="task-detail-panel">
        <div id="task-detail-empty" class="task-detail-empty">
          <div class="empty-icon">📋</div>
          <p>点击左侧任务查看详情</p>
        </div>
        <div id="task-detail-content" class="hidden"></div>
      </div>
      <!-- 最右侧：终端执行日志 -->
      <div class="task-terminal-panel" id="task-terminal-panel">
        <div class="terminal-header">
          <span class="terminal-title">
            <span class="terminal-dot red"></span>
            <span class="terminal-dot yellow"></span>
            <span class="terminal-dot green"></span>
            执行日志
          </span>
          <span id="terminal-member-label" class="terminal-member-label"></span>
          <button class="terminal-clear-btn" onclick="clearTerminal()">清空</button>
        </div>
        <div class="terminal-body" id="terminal-body">
          <div class="terminal-placeholder">← 点击步骤查看实时执行过程</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 组织架构视图 -->
  <div id="view-org" class="view hidden">
    <div class="org-container">
      <h2 class="org-title">组织架构</h2>
      <div class="org-teams" id="org-teams"></div>
    </div>
  </div>

  <!-- 新建群聊 Modal -->
  <div id="modal-new-group" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3>新建群聊</h3>
        <button class="modal-close" onclick="closeNewGroupModal()">✕</button>
      </div>
      <div class="modal-body">
        <input type="text" id="new-group-name" placeholder="群聊名称" class="modal-input">
        <p class="modal-label">选择成员：</p>
        <div id="member-checkboxes" class="member-checkboxes"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeNewGroupModal()">取消</button>
        <button class="btn-confirm" onclick="createGroup()">创建</button>
      </div>
    </div>
  </div>

  <!-- 成员资料 Modal -->
  <div id="modal-profile" class="modal hidden">
    <div class="modal-content modal-profile-content">
      <div class="modal-header">
        <h3 id="profile-name"></h3>
        <button class="modal-close" onclick="closeProfileModal()">✕</button>
      </div>
      <div class="modal-body" id="profile-body"></div>
    </div>
  </div>

  <div id="mention-dropdown" class="mention-dropdown hidden"></div>
  <script src="lib/marked.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
